<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网页管理界面</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }
        
        body {
            background-color: #f5f7fa;
            color: #333;
            line-height: 1.6;
            min-height: 100vh;
            padding: 20px 0;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 10%;
        }
        
        header {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid #e2e8f0;
        }
        
        h1 {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 10px;
            color: #2d3748;
        }
        
        .subtitle {
            color: #718096;
            font-size: 16px;
        }
        
        .card-container {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }
        
        .card {
            background: linear-gradient(145deg, #4a6cf7 0%, #3a56d4 100%);
            border-radius: 16px;
            padding: 30px;
            transition: all 0.3s ease;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(74, 108, 247, 0.15);
            position: relative;
            overflow: hidden;
            border: none;
        }
        
        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 15px 30px rgba(74, 108, 247, 0.25);
            background: linear-gradient(145deg, #3a56d4 0%, #4a6cf7 100%);
        }
        
        .card:active {
            transform: translateY(-3px);
        }
        
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, #5bc0ff, #4a6cf7);
        }
        
        .card::after {
            content: '';
            position: absolute;
            top: -20px;
            right: -20px;
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 50%;
        }
        
        .card-header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .card-title {
            font-size: 24px;
            font-weight: 600;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .card-icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.15);
            font-size: 22px;
            color: #fff;
        }
        
        .card-content {
            margin-bottom: 25px;
        }
        
        .card-description {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.95);
            line-height: 1.7;
        }
        
        .card-footer {
            display: flex;
            justify-content: flex-start;
            align-items: center;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            padding-top: 20px;
            color: rgba(255, 255, 255, 0.9);
        }
        
        .update-time {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
        }
        
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            color: #718096;
        }
        
        .empty-state i {
            font-size: 60px;
            margin-bottom: 25px;
            color: #cbd5e0;
        }
        
        .empty-state h3 {
            font-size: 24px;
            margin-bottom: 15px;
            color: #4a5568;
        }
        
        /* 密码验证弹窗样式 */
        .password-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            display: none;
        }
        
        .password-modal.show {
            display: flex;
        }
        
        .password-content {
            background: white;
            border-radius: 20px;
            padding: 40px 50px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            max-width: 400px;
            width: 90%;
            animation: modalAppear 0.3s ease;
        }
        
        @keyframes modalAppear {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        .password-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            background: linear-gradient(145deg, #4a6cf7 0%, #3a56d4 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 32px;
        }
        
        .password-header {
            margin-bottom: 25px;
        }
        
        .password-header h3 {
            font-size: 24px;
            color: #2d3748;
            margin-bottom: 8px;
        }
        
        .password-header p {
            color: #718096;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #4a5568;
            font-weight: 500;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #4a6cf7;
        }
        
        .password-buttons {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }
        
        .btn {
            flex: 1;
            padding: 14px 20px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(145deg, #4a6cf7 0%, #3a56d4 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(74, 108, 247, 0.3);
        }
        
        .btn-secondary {
            background: #f1f5f9;
            color: #64748b;
        }
        
        .btn-secondary:hover {
            background: #e2e8f0;
        }
        
        .error-message {
            color: #ef4444;
            font-size: 14px;
            margin-top: 10px;
            display: none;
        }
        
        .error-message.show {
            display: block;
        }
        
        /* 加载弹窗样式 */
        .loading-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1001;
            display: none;
        }
        
        .loading-modal.show {
            display: flex;
        }
        
        .loading-content {
            background: white;
            border-radius: 20px;
            padding: 40px 50px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            max-width: 350px;
            width: 90%;
        }
        
        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid #e6e6e6;
            border-top: 4px solid #4a6cf7;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 25px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .loading-text {
            font-size: 18px;
            color: #2d3748;
            font-weight: 500;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 0 5%;
            }
            
            .card {
                padding: 25px 20px;
            }
            
            .card-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }
            
            .password-content {
                padding: 30px;
            }
        }
        
        @media (max-width: 480px) {
            .container {
                padding: 0 20px;
            }
            
            .password-content {
                padding: 25px;
                max-width: 320px;
            }
            
            .password-buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-th-large"></i> 网页管理中心</h1>
            <p class="subtitle">管理您的所有网页资源 - 需要密码访问</p>
        </header>
        
        <main class="card-container" id="cardContainer">
            <!-- 卡片将通过JavaScript动态生成 -->
        </main>
    </div>

    <!-- 密码验证弹窗 -->
    <div class="password-modal" id="passwordModal">
        <div class="password-content">
            <div class="password-icon">
                <i class="fas fa-lock"></i>
            </div>
            <div class="password-header">
                <h3>密码验证</h3>
                <p>请输入用户名和密码访问该网页</p>
            </div>
            <div class="form-group">
                <label for="username"><i class="fas fa-user"></i> 用户名</label>
                <input type="text" id="username" placeholder="请输入用户名">
            </div>
            <div class="form-group">
                <label for="password"><i class="fas fa-key"></i> 密码</label>
                <input type="password" id="password" placeholder="请输入密码">
            </div>
            <div class="error-message" id="errorMessage">
                <i class="fas fa-exclamation-circle"></i> 用户名或密码错误！
            </div>
            <div class="password-buttons">
                <button class="btn btn-secondary" id="cancelBtn">取消</button>
                <button class="btn btn-primary" id="loginBtn">验证</button>
            </div>
        </div>
    </div>

    <!-- 加载弹窗 -->
    <div class="loading-modal" id="loadingModal">
        <div class="loading-content">
            <div class="loading-spinner"></div>
            <div class="loading-text">正在进入...</div>
        </div>
    </div>

    <script>
        // 网页数据 - 修改为跳转到main文件夹下的文件
        const webPages = [
            {
                id: 1,
                title: "小红薯评论生成工具",
                description: "仅供学习交流，禁止非法用途",
                lastUpdated: "2026-02-06",
                fileName: "createcomments.html",
                icon: "fas fa-building"
            }
            // 您可以在这里添加更多网页
            // {
            //     id: 2,
            //     title: "示例页面",
            //     description: "这是一个示例页面",
            //     lastUpdated: "2026-02-06",
            //     fileName: "example.html",
            //     icon: "fas fa-file-alt"
            // }
        ];

        // 默认登录凭证
        const DEFAULT_USERNAME = "admin";
        const DEFAULT_PASSWORD = "admin8888";

        // 获取DOM元素
        const cardContainer = document.getElementById('cardContainer');
        const passwordModal = document.getElementById('passwordModal');
        const loadingModal = document.getElementById('loadingModal');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const errorMessage = document.getElementById('errorMessage');
        const loginBtn = document.getElementById('loginBtn');
        const cancelBtn = document.getElementById('cancelBtn');

        // 当前点击的页面信息
        let currentPageToOpen = null;

        // 显示密码弹窗
        function showPasswordModal(page) {
            currentPageToOpen = page;
            usernameInput.value = DEFAULT_USERNAME;
            passwordInput.value = '';
            errorMessage.classList.remove('show');
            passwordModal.classList.add('show');
            usernameInput.focus();
        }

        // 隐藏密码弹窗
        function hidePasswordModal() {
            passwordModal.classList.remove('show');
        }

        // 显示加载弹窗
        function showLoadingModal() {
            loadingModal.classList.add('show');
        }

        // 隐藏加载弹窗
        function hideLoadingModal() {
            loadingModal.classList.remove('show');
        }

        // 验证密码
        function validatePassword(username, password) {
            return username === DEFAULT_USERNAME && password === DEFAULT_PASSWORD;
        }

        // 打开本地文件
        function openLocalFile(fileName, title) {
            const filePath = `./main/${fileName}`;
            
            showLoadingModal();
            
            // 2秒后自动跳转
            setTimeout(() => {
                window.location.href = filePath;
            }, 2000);
        }

        // 处理登录按钮点击
        loginBtn.addEventListener('click', () => {
            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();
            
            if (!username || !password) {
                errorMessage.textContent = "请输入用户名和密码！";
                errorMessage.classList.add('show');
                return;
            }
            
            if (validatePassword(username, password)) {
                // 验证成功
                hidePasswordModal();
                errorMessage.classList.remove('show');
                
                if (currentPageToOpen) {
                    openLocalFile(currentPageToOpen.fileName, currentPageToOpen.title);
                }
            } else {
                // 验证失败
                errorMessage.textContent = "用户名或密码错误！";
                errorMessage.classList.add('show');
                passwordInput.value = '';
                passwordInput.focus();
            }
        });

        // 处理取消按钮点击
        cancelBtn.addEventListener('click', () => {
            hidePasswordModal();
            currentPageToOpen = null;
        });

        // 按Enter键提交
        passwordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                loginBtn.click();
            }
        });

        // 点击模态框外部关闭
        passwordModal.addEventListener('click', (e) => {
            if (e.target === passwordModal) {
                hidePasswordModal();
                currentPageToOpen = null;
            }
        });

        // 生成网页卡片
        function renderCards() {
            cardContainer.innerHTML = '';
            
            if (webPages.length === 0) {
                cardContainer.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-folder-open"></i>
                        <h3>暂无网页</h3>
                        <p>暂无网页可管理</p>
                    </div>
                `;
                return;
            }
            
            webPages.forEach(page => {
                const card = document.createElement('div');
                card.className = 'card';
                
                card.innerHTML = `
                    <div class="card-header">
                        <div class="card-title">
                            <div class="card-icon">
                                <i class="${page.icon}"></i>
                            </div>
                            <span>${page.title}</span>
                        </div>
                    </div>
                    <div class="card-content">
                        <p class="card-description">${page.description}</p>
                    </div>
                    <div class="card-footer">
                        <div class="update-time">
                            <i class="fas fa-clock"></i>
                            更新于: ${page.lastUpdated}
                        </div>
                    </div>
                `;
                
                // 点击卡片时显示密码验证弹窗
                card.addEventListener('click', () => {
                    showPasswordModal(page);
                });
                
                cardContainer.appendChild(card);
            });
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            renderCards();
        });
    </script>
</body>
</html>
